<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgroSur S.A. — Crónicas del Cambio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --felt:#15251c;
  --felt-2:#1b2f24;
  --panel:#1f3528;
  --panel-line:#2c4636;
  --paper:#f5f0e4;
  --paper-2:#ece4d2;
  --ink:#2a2620;
  --ink-soft:#6b6354;
  --caja:#e0b13a;
  --confianza:#cf7359;
  --adopcion:#34a0a4;
  --motivacion:#e8693c;
  --verde:#5a9e3f;
  --ambar:#d9a521;
  --rojo:#cf4631;
  --tech:#34a0a4;
  --sans:'Space Grotesk',system-ui,sans-serif;
  --serif:'Spectral',Georgia,serif;
  --mono:'Space Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  color:var(--paper);
  background:
    radial-gradient(120% 90% at 50% 0%, #1f3527 0%, var(--felt) 55%, #0f1c14 100%);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 5px);
  opacity:.6;
}
#root{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 64px}

/* ---------- Botones ---------- */
.btn{
  font-family:var(--sans);font-weight:600;cursor:pointer;border:none;border-radius:11px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
}
.btn:active{transform:translateY(1px)}
.btn-grande{
  background:linear-gradient(180deg,#3fb0a6,#2d8e88);color:#06201f;
  padding:15px 26px;font-size:1.02rem;letter-spacing:.01em;
  box-shadow:0 6px 0 #1d5f5b, 0 10px 22px rgba(0,0,0,.32);
  margin-top:8px;
}
.btn-grande:hover{filter:brightness(1.05)}
.btn-grande:active{box-shadow:0 3px 0 #1d5f5b, 0 6px 14px rgba(0,0,0,.32);transform:translateY(3px)}
.btn-ghost{
  background:transparent;color:var(--paper);border:1.5px solid rgba(245,240,228,.32);
  padding:12px 22px;font-size:.95rem;margin-top:10px;
}
.btn-ghost:hover{border-color:rgba(245,240,228,.6);background:rgba(245,240,228,.05)}

/* ---------- Pantallas genéricas ---------- */
.pantalla{width:100%;max-width:680px;margin:auto;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.seccion-titulo{font-size:1.7rem;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}

/* ---------- Intro ---------- */
.intro{justify-content:center;min-height:80vh;position:relative}
.intro-inner{max-width:560px}
.intro-kicker{font-family:var(--mono);text-transform:uppercase;letter-spacing:.28em;font-size:.7rem;color:var(--tech);margin-bottom:18px}
.intro-titulo{font-family:var(--sans);font-weight:700;font-size:clamp(3rem,11vw,5.2rem);line-height:.92;letter-spacing:-.03em}
.intro-sa{color:var(--caja)}
.intro-sub{font-family:var(--serif);font-style:italic;font-size:clamp(1.3rem,4vw,1.9rem);color:var(--paper-2);margin-top:6px;opacity:.92}
.intro-lead{font-family:var(--serif);font-size:1.12rem;line-height:1.6;color:var(--paper-2);margin:26px auto 30px;max-width:480px;text-wrap:pretty}
.intro-lead strong{color:#fff;font-weight:600}
.intro-pie{font-family:var(--mono);font-size:.72rem;color:rgba(245,240,228,.4);margin-top:34px;letter-spacing:.05em}
.intro-deco{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:-1}
.deco-ind{position:absolute;font-size:5rem;opacity:.05;filter:grayscale(.3)}
.deco-ind:nth-child(1){top:8%;left:6%;transform:rotate(-12deg)}
.deco-ind:nth-child(2){top:14%;right:7%;transform:rotate(10deg)}
.deco-ind:nth-child(3){bottom:12%;left:10%;transform:rotate(8deg)}
.deco-ind:nth-child(4){bottom:9%;right:9%;transform:rotate(-9deg)}

/* ---------- Cómo jugar ---------- */
.cj-card{background:var(--paper);color:var(--ink);border-radius:18px;padding:34px 30px;max-width:600px;text-align:left;box-shadow:0 18px 44px rgba(0,0,0,.4);border:1px solid #d9cfb6}
.cj-titulo{font-size:1.7rem;margin-bottom:16px;letter-spacing:-.01em}
.cj-lista{list-style:none;counter-reset:cj;display:flex;flex-direction:column;gap:13px}
.cj-lista li{position:relative;padding-left:42px;font-family:var(--serif);font-size:1.04rem;line-height:1.5;counter-increment:cj}
.cj-lista li::before{content:counter(cj);position:absolute;left:0;top:-1px;width:28px;height:28px;border-radius:50%;background:var(--tech);color:#06201f;font-family:var(--sans);font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.cj-lista b{font-weight:700}
.rojo-txt{color:var(--rojo)}
.cj-consejo{margin-top:20px;padding:14px 16px;background:var(--paper-2);border-left:3px solid var(--caja);border-radius:6px;font-family:var(--serif);font-style:italic;font-size:1rem;color:var(--ink-soft)}
.cj-card .btn-grande{margin-top:24px}

/* ---------- Modo / count ---------- */
.modo-grid{display:grid;grid-template-columns:1fr;gap:14px;width:100%;max-width:520px;margin-top:22px}
.modo-card{background:var(--panel);border:1.5px solid var(--panel-line);border-radius:15px;padding:20px 22px;text-align:left;cursor:pointer;color:var(--paper);display:flex;flex-direction:column;gap:5px;transition:transform .14s,border-color .14s,background .14s}
.modo-card:hover{transform:translateY(-3px);border-color:var(--tech);background:#244031}
.modo-emoji{font-size:1.9rem}
.modo-nombre{font-size:1.22rem;font-weight:700}
.modo-desc{font-family:var(--serif);color:var(--paper-2);font-size:.98rem;line-height:1.45;opacity:.88}
.count-grid{display:flex;gap:16px;margin-top:24px}
.count-btn{width:90px;height:90px;border-radius:18px;background:var(--panel);border:1.5px solid var(--panel-line);color:var(--paper);font-family:var(--sans);font-size:2.4rem;font-weight:700;cursor:pointer;transition:transform .14s,border-color .14s,background .14s}
.count-btn:hover{transform:translateY(-3px);border-color:var(--tech);background:#244031}

/* ---------- Arquetipo ---------- */
.arq-select{max-width:880px}
.nombre-input{font-family:var(--sans);font-size:1rem;padding:12px 16px;border-radius:10px;border:1.5px solid var(--panel-line);background:var(--panel);color:var(--paper);width:100%;max-width:340px;margin:6px 0 20px;text-align:center}
.nombre-input::placeholder{color:rgba(245,240,228,.45)}
.nombre-input:focus{outline:none;border-color:var(--tech)}
.arq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;width:100%;margin-top:8px}
.arq-card{background:var(--paper);color:var(--ink);border-radius:15px;padding:18px;text-align:left;cursor:pointer;border:2px solid transparent;transition:transform .14s,box-shadow .14s,border-color .14s;box-shadow:0 8px 20px rgba(0,0,0,.28)}
.arq-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.4);border-color:var(--tech)}
.arq-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.arq-emoji{font-size:1.7rem}
.arq-nombre{font-size:1.18rem;font-weight:700}
.arq-desafio{font-family:var(--serif);font-size:.95rem;line-height:1.4;color:var(--ink-soft);margin-bottom:14px;min-height:2.6em}
.arq-stats{display:flex;flex-direction:column;gap:7px}
.arq-stat{display:flex;align-items:center;gap:9px}
.arq-stat-emoji{font-size:.95rem;width:20px;text-align:center}
.arq-mini-track{flex:1;height:7px;border-radius:4px;background:#e2d8c1;overflow:hidden}
.arq-mini-fill{height:100%;border-radius:4px}
.arq-stat-num{font-family:var(--mono);font-size:.82rem;font-weight:700;width:26px;text-align:right}

/* ---------- Play wrap ---------- */
.play-wrap{width:100%;max-width:680px;margin:auto;display:flex;flex-direction:column;gap:18px}

/* ---------- Tablero ---------- */
.tablero{background:var(--panel);border:1.5px solid var(--panel-line);border-radius:16px;padding:16px 18px;box-shadow:0 8px 22px rgba(0,0,0,.3)}
.tablero-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tablero-empresa{display:flex;align-items:center;gap:11px}
.tablero-emoji{font-size:1.9rem}
.tablero-nombre{font-weight:700;font-size:1.06rem;line-height:1.1}
.tablero-arq{font-family:var(--mono);font-size:.72rem;color:var(--tech);letter-spacing:.04em;margin-top:2px}
.tablero-ronda{text-align:right}
.ronda-label{display:block;font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.2em;color:var(--paper-2);opacity:.7}
.ronda-num{font-family:var(--sans);font-weight:700;font-size:1.7rem;line-height:1}
.ronda-tot{font-size:.9rem;color:var(--paper-2);opacity:.6;font-weight:500}
.tablero-barras{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}

/* ---------- Barra ---------- */
.barra{}
.barra-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.barra-emoji{font-size:.95rem}
.barra-nombre{font-size:.8rem;font-weight:500;color:var(--paper-2);flex:1}
.barra-num{font-family:var(--mono);font-weight:700;font-size:.92rem}
.barra-track{height:9px;border-radius:5px;background:rgba(0,0,0,.28);overflow:hidden}
.barra-fill{height:100%;border-radius:5px;transition:width .65s cubic-bezier(.4,1.3,.5,1),background .4s}
.barra-rojo .barra-num{animation:pulseRed 1.1s ease-in-out infinite}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.45}}

/* ---------- Ronda / Carta ---------- */
.ronda-view{position:relative;animation:cardIn .4s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:none}}
.crisis-ribbon,.evento-ribbon{display:inline-block;font-family:var(--mono);font-weight:700;font-size:.74rem;letter-spacing:.14em;padding:6px 14px;border-radius:8px 8px 0 0;margin-left:14px;position:relative;top:1px}
.crisis-ribbon{background:var(--rojo);color:#fff}
.evento-ribbon{background:var(--caja);color:#3a2c08}
.carta{background:var(--paper);color:var(--ink);border-radius:16px;padding:26px 26px 24px;box-shadow:0 18px 44px rgba(0,0,0,.42);border:1px solid #d9cfb6;position:relative}
.es-crisis .carta{border:2px solid var(--rojo);box-shadow:0 18px 44px rgba(0,0,0,.42),0 0 0 4px rgba(207,70,49,.12)}
.carta::after{content:"";position:absolute;inset:7px;border:1px solid rgba(42,38,32,.1);border-radius:11px;pointer-events:none}
.clase-tag{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px}
.clase-cod{font-family:var(--mono);font-weight:700;font-size:.72rem;background:var(--ink);color:var(--paper);padding:3px 9px;border-radius:5px;letter-spacing:.03em}
.clase-tema{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft)}
.carta-titulo{font-family:var(--sans);font-weight:700;font-size:1.7rem;line-height:1.08;letter-spacing:-.015em;margin-bottom:12px}
.carta-narrativa{font-family:var(--serif);font-size:1.1rem;line-height:1.58;color:#41382c;text-wrap:pretty}

/* ---------- Opciones ---------- */
.opciones{display:flex;flex-direction:column;gap:11px;margin-top:20px}
.opcion{position:relative;text-align:left;background:var(--paper-2);border:1.5px solid #ddd3bb;border-radius:12px;padding:14px 15px;cursor:pointer;font-family:var(--sans);color:var(--ink);transition:transform .12s,border-color .12s,box-shadow .12s,background .12s}
.opcion:hover{transform:translateX(3px);border-color:var(--tech);box-shadow:-4px 0 0 var(--tech),0 4px 14px rgba(0,0,0,.12)}
.opcion-dado{background:#eef0e8;border-color:#cdd6c0}
.opcion-dado:hover{border-color:var(--tech)}
.opcion-head{display:flex;align-items:flex-start;gap:11px}
.opcion-letra{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:var(--ink);color:var(--paper);font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.opcion-texto{font-size:1.02rem;font-weight:500;line-height:1.35;flex:1;padding-top:2px}
.opcion-d20{font-size:1.15rem;flex-shrink:0}
.opcion-ef{margin-top:10px;padding-left:37px}
.opcion-dado-info{margin-top:10px;padding-left:37px;display:flex;flex-direction:column;gap:7px}
.opcion-costo{font-family:var(--mono);font-size:.78rem;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
.dado-linea{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:2px}
.dado-badge{font-family:var(--mono);font-size:.72rem;font-weight:700;background:var(--tech);color:#06201f;padding:3px 8px;border-radius:5px}
.dado-warning{font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--rojo)}
.dado-normal{font-family:var(--mono);font-size:.72rem;color:var(--ink-soft)}
.rama{display:flex;align-items:center;gap:9px;font-size:.8rem}
.rama-label{font-family:var(--mono);font-weight:700;width:62px;flex-shrink:0}
.rama-exito .rama-label{color:var(--verde)}
.rama-fracaso .rama-label{color:var(--rojo)}

/* ---------- Chips de efecto ---------- */
.efectos{display:inline-flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:3px;border:1.5px solid var(--c);border-radius:20px;padding:2px 9px 2px 7px;background:color-mix(in srgb,var(--c) 12%,transparent)}
.chip-emoji{font-size:.78rem}
.chip-val{font-family:var(--mono);font-weight:700;font-size:.78rem;color:var(--c)}
.chip-neutro{font-family:var(--mono);font-size:.76rem;color:var(--ink-soft);border:1px dashed #c3b89b;padding:2px 9px;border-radius:20px}

/* ---------- Resolución ---------- */
.resolucion{margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:14px}
.resol-opcion{font-family:var(--serif);font-size:1.02rem;color:#41382c;align-self:stretch;padding:11px 14px;background:var(--paper-2);border-radius:9px;border-left:3px solid var(--ink)}
.resol-nota{font-family:var(--serif);font-size:1.06rem;line-height:1.5;text-align:center;max-width:480px;text-wrap:pretty}
.nota-exito{color:#2f6b22}
.nota-fracaso{color:#9c3527}

/* ---------- Dado d20 ---------- */
.dado-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.dado{position:relative;width:108px;height:108px;display:flex;align-items:center;justify-content:center}
.dado-svg{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))}
.dado-svg polygon{fill:#efe7d3;stroke:#2a2620;stroke-width:2.4;stroke-linejoin:round}
.dado-svg .dado-inner{fill:rgba(42,38,32,.06);stroke:rgba(42,38,32,.35);stroke-width:1.2}
.dado-num{position:relative;font-family:var(--sans);font-weight:700;font-size:2.5rem;color:var(--ink);z-index:1}
.dado-rolling{animation:tumble .5s linear infinite}
@keyframes tumble{0%{transform:rotate(0) scale(1)}25%{transform:rotate(90deg) scale(1.06)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.06)}100%{transform:rotate(360deg) scale(1)}}
.dado-exito .dado-svg polygon{stroke:var(--verde)}
.dado-exito{filter:drop-shadow(0 0 14px rgba(90,158,63,.7))}
.dado-fracaso .dado-svg polygon{stroke:var(--rojo)}
.dado-fracaso{filter:drop-shadow(0 0 14px rgba(207,70,49,.6))}
.dado-result{font-family:var(--sans);font-weight:700;font-size:1.15rem}
.txt-exito{color:var(--verde)}
.txt-fracaso{color:var(--rojo)}
.dado-tirada{font-family:var(--mono);font-weight:400;font-size:.84rem;opacity:.8}
.dado-objetivo{font-family:var(--mono);font-size:.84rem;color:var(--ink-soft)}

/* ---------- Concepto box ---------- */
.concepto-box{display:flex;gap:12px;align-items:flex-start;background:#13251c;color:var(--paper);border-radius:11px;padding:14px 16px;align-self:stretch;border:1px solid #2c4636}
.concepto-icon{font-size:1.3rem;flex-shrink:0}
.concepto-titulo{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.18em;color:var(--tech);margin-bottom:4px}
.concepto-texto{font-family:var(--serif);font-size:1rem;line-height:1.45;color:var(--paper-2)}
.concepto-pres{border:2px solid var(--tech);box-shadow:0 0 0 4px rgba(52,160,164,.15)}

/* ---------- Evento ---------- */
.carta-evento{border-color:#e3c98c}
.evento-efectos{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:16px 0 6px}
.evento-ef-label{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--ink-soft)}
.evento-view .concepto-box{margin-top:16px}
.evento-view .btn-grande{margin-top:18px;align-self:center}

/* ---------- Final ---------- */
.final-screen{justify-content:center;min-height:80vh}
.final-card{background:var(--paper);color:var(--ink);border-radius:20px;padding:38px 32px;max-width:560px;box-shadow:0 22px 54px rgba(0,0,0,.5);border:1px solid #d9cfb6;border-top:6px solid var(--final-c)}
.final-emoji{font-size:4rem;line-height:1}
.final-kicker{font-family:var(--mono);text-transform:uppercase;letter-spacing:.22em;font-size:.7rem;color:var(--ink-soft);margin:12px 0 4px}
.final-titulo{font-family:var(--sans);font-weight:700;font-size:2.1rem;letter-spacing:-.02em;line-height:1.05}
.final-narrativa{font-family:var(--serif);font-size:1.12rem;line-height:1.6;color:#41382c;margin:16px auto 22px;max-width:460px;text-wrap:pretty}
.valor-empresa{display:flex;flex-direction:column;align-items:center;gap:2px;margin:6px 0 20px}
.valor-label{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-soft)}
.valor-num{font-family:var(--sans);font-weight:700;font-size:3.6rem;line-height:1}
.valor-100{font-size:1.3rem;color:var(--ink-soft);font-weight:500}
.final-indicadores{display:flex;justify-content:center;gap:22px;margin-bottom:24px}
.final-ind{display:flex;flex-direction:column;align-items:center;gap:2px}
.final-ind-emoji{font-size:1.4rem}
.final-ind-num{font-family:var(--mono);font-weight:700;font-size:1.25rem}
.final-ind-nombre{font-size:.72rem;color:var(--ink-soft)}

/* ---------- Informe ---------- */
.informe-screen{max-width:720px}
.informe-card{background:var(--paper);color:var(--ink);border-radius:18px;padding:30px 30px 26px;width:100%;text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.46);border:1px solid #d9cfb6}
.informe-head{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:2px solid #e2d8c1;margin-bottom:6px}
.informe-icon{font-size:2.2rem}
.informe-kicker{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.18em;color:var(--tech)}
.informe-titulo{font-family:var(--sans);font-weight:700;font-size:1.45rem;letter-spacing:-.01em}
.informe-valor{margin-left:auto;display:flex;flex-direction:column;align-items:center;font-size:1.5rem}
.informe-valor b{font-family:var(--sans);font-size:2rem;line-height:1}
.informe-cuerpo{display:flex;flex-direction:column;gap:18px;padding:18px 0}
.informe-seccion-titulo{font-family:var(--sans);font-weight:700;font-size:1.1rem;margin-bottom:5px;color:var(--ink);display:flex;align-items:center;gap:8px}
.informe-seccion-titulo::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--tech);display:inline-block}
.informe-seccion-texto{font-family:var(--serif);font-size:1.06rem;line-height:1.6;color:#41382c;text-wrap:pretty}
.informe-firma{font-family:var(--serif);font-style:italic;text-align:right;color:var(--ink-soft);padding-top:8px;border-top:1px dashed #cabfa3;margin-top:4px}
.informe-acciones{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:18px}

/* ---------- Posiciones ---------- */
.posiciones{max-width:600px}
.posiciones-sub{font-family:var(--serif);font-style:italic;color:var(--paper-2);margin-bottom:18px;opacity:.85}
.rank-lista{width:100%;display:flex;flex-direction:column;gap:11px;margin-bottom:22px}
.rank-fila{display:flex;align-items:center;gap:13px;background:var(--panel);border:1.5px solid var(--panel-line);border-radius:13px;padding:13px 16px}
.rank-ganador{border-color:var(--caja);box-shadow:0 0 0 3px rgba(224,177,58,.18)}
.rank-medalla{font-size:1.5rem}
.rank-emoji{font-size:1.5rem}
.rank-info{flex:1;text-align:left;min-width:0}
.rank-nombre{font-weight:700;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-final{font-family:var(--serif);font-size:.86rem;margin-top:1px}
.rank-informe{font-family:var(--mono);font-size:.72rem;font-weight:700;background:transparent;border:1.5px solid var(--panel-line);color:var(--paper-2);padding:6px 10px;border-radius:8px;cursor:pointer;transition:border-color .12s,color .12s}
.rank-informe:hover{border-color:var(--tech);color:var(--tech)}
.rank-valor{font-family:var(--sans);font-weight:700;font-size:1.9rem;min-width:42px;text-align:right}

/* ---------- Handoff ---------- */
.handoff{justify-content:center;min-height:70vh}
.handoff-card{background:var(--panel);border:1.5px solid var(--panel-line);border-radius:20px;padding:42px 38px;box-shadow:0 18px 44px rgba(0,0,0,.4)}
.handoff-emoji{font-size:3.2rem}
.handoff-txt{font-family:var(--serif);font-size:1.1rem;color:var(--paper-2);margin-top:10px}
.handoff-nombre{font-family:var(--sans);font-weight:700;font-size:2rem;margin-top:6px}
.handoff-arq{font-family:var(--mono);color:var(--tech);font-size:.9rem;margin-top:4px;letter-spacing:.03em}
.handoff-card .btn-grande{margin-top:24px}

/* ---------- Responsive ---------- */
@media (max-width:520px){
  .carta{padding:22px 18px}
  .carta-titulo{font-size:1.45rem}
  .tablero-barras{gap:11px 14px}
  .final-card{padding:30px 22px}
  .informe-card{padding:24px 20px}
  .arq-grid{grid-template-columns:1fr}
}
</style>
</head>
